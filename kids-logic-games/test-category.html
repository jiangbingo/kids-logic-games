<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分类功能测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .category-tabs { display: flex; gap: 15px; margin-bottom: 30px; justify-content: center; }
        .category-tab {
            padding: 16px 28px;
            background: rgba(255, 255, 255, 0.25);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 25px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            min-width: 120px;
        }
        .category-tab:hover { background: rgba(255, 255, 255, 0.4); }
        .category-tab.active {
            background: white;
            color: #667eea;
            border-color: white;
        }
        .game-card {
            padding: 20px;
            margin: 10px;
            background: white;
            border-radius: 12px;
            text-align: center;
        }
        .game-card.hidden { display: none; }
    </style>
</head>
<body>
    <h1 style="color: white; margin-bottom: 30px;">分类筛选测试</h1>
    
    <div class="category-tabs">
        <button class="category-tab active" data-category="all" onclick="filterByCategory('all', this)">全部</button>
        <button class="category-tab" data-category="cognitive" onclick="filterByCategory('cognitive', this)">认知</button>
        <button class="category-tab" data-category="logic" onclick="filterByCategory('logic', this)">逻辑</button>
    </div>
    
    <div class="game-card" data-category="cognitive">🎨 认知游戏</div>
    <div class="game-card" data-category="cognitive">🔢 数字游戏</div>
    <div class="game-card" data-category="logic">🧩 逻辑游戏</div>
    <div class="game-card" data-category="logic">🎯 拼图游戏</div>
    
    <script>
    function filterByCategory(category, clickedElement) {
        console.log('点击分类:', category);
        
        const categoryTabs = document.querySelectorAll('.category-tab');
        const gameCards = document.querySelectorAll('.game-card');
        
        // 更新标签状态
        categoryTabs.forEach(t => t.classList.remove('active'));
        if (clickedElement) {
            clickedElement.classList.add('active');
        }
        
        // 筛选游戏卡片
        gameCards.forEach(card => {
            if (category === 'all') {
                card.classList.remove('hidden');
            } else {
                const cardCategory = card.dataset.category;
                if (cardCategory === category) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            }
        });
    }
    </script>
</body>
</html>
