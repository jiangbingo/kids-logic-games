<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>记忆翻牌游戏 🎴</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
      color: white;
    }

    .header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .stats {
      display: flex;
      gap: 20px;
      justify-content: center;
      font-size: 1.2rem;
    }

    .stat {
      background: rgba(255,255,255,0.2);
      padding: 8px 16px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }

    .game-container {
      background: rgba(255,255,255,0.95);
      padding: 30px;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
    }

    .card {
      width: 90px;
      height: 90px;
      perspective: 1000px;
      cursor: pointer;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s;
      transform-style: preserve-3d;
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card.matched .card-inner {
      transform: rotateY(180deg);
      animation: bounce 0.5s ease;
    }

    @keyframes bounce {
      0%, 100% { transform: rotateY(180deg) scale(1); }
      50% { transform: rotateY(180deg) scale(1.1); }
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .card-back {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: 4px solid rgba(255,255,255,0.3);
    }

    .card-back::after {
      content: '🎴';
      font-size: 2.5rem;
    }

    .card-front {
      background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
      transform: rotateY(180deg);
      border: 3px solid #667eea;
    }

    .card.matched .card-front {
      background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
      border-color: #5cd6c9;
    }

    .replay-btn {
      margin-top: 30px;
      padding: 15px 40px;
      font-size: 1.3rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      font-weight: 600;
    }

    .replay-btn:hover, .replay-btn:active {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }

    /* Celebration overlay */
    .celebration {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.5s;
    }

    .celebration.active {
      opacity: 1;
    }

    .celebration-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 4rem;
      color: white;
      text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
      animation: celebrate 1s ease infinite;
      text-align: center;
    }

    @keyframes celebrate {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.1); }
    }

    .confetti {
      position: absolute;
      width: 15px;
      height: 15px;
      animation: fall 3s linear forwards;
    }

    @keyframes fall {
      0% {
        transform: translateY(-100px) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
      }
    }

    /* iPad optimization */
    @media (min-width: 768px) {
      .card {
        width: 100px;
        height: 100px;
      }

      .card-face {
        font-size: 4rem;
      }

      .card-back::after {
        font-size: 3rem;
      }
    }

    /* Touch feedback */
    .card:active .card-inner {
      transform: scale(0.95);
    }

    .card.matched:active .card-inner {
      transform: rotateY(180deg) scale(0.95);
    }

    /* Loading state */
    .checking .card-inner {
      transition: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>记忆翻牌 🎴</h1>
    <div class="stats">
      <div class="stat">步数: <span id="moves">0</span></div>
      <div class="stat">配对: <span id="pairs">0</span>/6</div>
    </div>
  </div>

  <div class="game-container">
    <div class="grid" id="game-grid">
      <!-- Cards will be generated here -->
    </div>
  </div>

  <button class="replay-btn" id="replay-btn" onclick="initGame()">
    🔄 重新开始
  </button>

  <div class="celebration" id="celebration">
    <div class="celebration-text">
      🎉 太棒了!<br>
      <small style="font-size: 2rem;">你完成了!</small>
    </div>
  </div>

  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script src="js/storage.js"></script>
  <script>
    // Emoji pairs for game (6 pairs = 12 cards)
    let EMOJIS = ['🐶', '🐱', '🐰', '🦊', '🐻', '🐼'];
    
    // 尝试加载 AI 缓存的题目
    try {
      const aiCache = new AIGameCache();
      const aiGameData = aiCache.getLatestGame('memory');
      if (aiGameData && aiGameData.emojis && aiGameData.emojis.length >= 6) {
        EMOJIS = aiGameData.emojis;
        console.log('✅ 使用 AI 生成的题目:', EMOJIS);
      }
    } catch (error) {
      console.warn('加载 AI 题目失败,使用默认题目:', error);
    }
    
    let cards = [];
    let flippedCards = [];
    let matchedPairs = 0;
    let moves = 0;
    let isLocked = false;

    // Shuffle array
    function shuffle(array) {
      const shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    // Create card element
    function createCard(emoji, index) {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.emoji = emoji;
      card.dataset.index = index;
      card.innerHTML = `
        <div class="card-inner">
          <div class="card-face card-back"></div>
          <div class="card-face card-front">${emoji}</div>
        </div>
      `;
      
      // Use htmx-style event binding
      card.setAttribute('hx-trigger', 'touchstart, click');
      card.setAttribute('hx-on:touchstart', 'flipCard(this)');
      card.setAttribute('hx-on:click', 'flipCard(this)');
      
      // Direct event listeners for immediate response
      card.addEventListener('click', (e) => {
        e.preventDefault();
        flipCard(card);
      });
      
      card.addEventListener('touchstart', (e) => {
        e.preventDefault();
        flipCard(card);
      }, { passive: false });

      return card;
    }

    // Initialize game
    function initGame() {
      const grid = document.getElementById('game-grid');
      grid.innerHTML = '';
      
      // Reset state
      flippedCards = [];
      matchedPairs = 0;
      moves = 0;
      isLocked = false;
      
      // Update display
      document.getElementById('moves').textContent = '0';
      document.getElementById('pairs').textContent = '0';
      
      // Hide celebration
      document.getElementById('celebration').classList.remove('active');
      
      // Create card pairs
      const emojiPairs = [...EMOJIS, ...EMOJIS];
      cards = shuffle(emojiPairs);
      
      // Create card elements
      cards.forEach((emoji, index) => {
        const card = createCard(emoji, index);
        grid.appendChild(card);
      });
    }

    // Flip card function
    function flipCard(card) {
      // Prevent flipping if locked, already flipped, or matched
      if (isLocked || 
          card.classList.contains('flipped') || 
          card.classList.contains('matched')) {
        return;
      }

      // Flip the card
      card.classList.add('flipped');
      flippedCards.push(card);

      // Check for match when two cards are flipped
      if (flippedCards.length === 2) {
        moves++;
        document.getElementById('moves').textContent = moves;
        checkMatch();
      }
    }

    // Check if cards match
    function checkMatch() {
      isLocked = true;
      const [card1, card2] = flippedCards;
      const isMatch = card1.dataset.emoji === card2.dataset.emoji;

      if (isMatch) {
        // Match found
        setTimeout(() => {
          card1.classList.add('matched');
          card2.classList.add('matched');
          matchedPairs++;
          document.getElementById('pairs').textContent = matchedPairs;
          
          flippedCards = [];
          isLocked = false;

          // Check for win
          if (matchedPairs === 6) {
            setTimeout(showCelebration, 500);
          }
        }, 300);
      } else {
        // No match - flip back
        setTimeout(() => {
          card1.classList.remove('flipped');
          card2.classList.remove('flipped');
          flippedCards = [];
          isLocked = false;
        }, 1000);
      }
    }

    // Show celebration animation
    function showCelebration() {
      const celebration = document.getElementById('celebration');
      celebration.classList.add('active');
      
      // Create confetti
      createConfetti();
    }

    // Create confetti particles
    function createConfetti() {
      const celebration = document.getElementById('celebration');
      const colors = ['#ff6b6b', '#4ecdc4', '#ffe66d', '#95e1d3', '#f38181', '#aa96da'];
      const shapes = ['🎉', '🎊', '⭐', '💫', '✨', '🌟'];
      
      for (let i = 0; i < 50; i++) {
        setTimeout(() => {
          const confetti = document.createElement('div');
          confetti.className = 'confetti';
          confetti.textContent = shapes[Math.floor(Math.random() * shapes.length)];
          confetti.style.left = Math.random() * 100 + 'vw';
          confetti.style.animationDelay = Math.random() * 2 + 's';
          confetti.style.fontSize = (Math.random() * 20 + 15) + 'px';
          celebration.appendChild(confetti);
          
          // Remove after animation
          setTimeout(() => confetti.remove(), 5000);
        }, i * 100);
      }
    }

    // Initialize game on load
    document.addEventListener('DOMContentLoaded', initGame);
    
    // Also initialize immediately in case DOM is already loaded
    if (document.readyState === 'complete' || document.readyState === 'interactive') {
      initGame();
    }
  </script>
</body>
</html>
