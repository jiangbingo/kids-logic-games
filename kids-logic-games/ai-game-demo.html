<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 智能题目生成 Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 10px;
            font-size: clamp(24px, 5vw, 36px);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
            margin-bottom: 30px;
            font-size: clamp(14px, 3vw, 18px);
        }

        .stats-bar {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 15px 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stat-item {
            color: white;
            font-size: clamp(12px, 2.5vw, 14px);
            text-align: center;
        }

        .stat-value {
            font-size: clamp(18px, 4vw, 24px);
            font-weight: bold;
            display: block;
            margin-top: 5px;
        }

        .game-tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 5px;
            margin-bottom: 20px;
            gap: 5px;
        }

        .game-tab {
            flex: 1;
            padding: 12px 10px;
            background: transparent;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: clamp(12px, 3vw, 16px);
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .game-tab.active {
            background: white;
            color: #667eea;
            font-weight: bold;
        }

        .game-tab:hover:not(.active) {
            background: rgba(255, 255, 255, 0.3);
        }

        .control-panel {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group:last-child {
            margin-bottom: 0;
        }

        .control-label {
            display: block;
            margin-bottom: 10px;
            font-size: clamp(14px, 3vw, 16px);
            color: #333;
            font-weight: bold;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .option-btn {
            flex: 1;
            min-width: 80px;
            padding: 10px 15px;
            background: #f0f0f0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: clamp(12px, 2.5vw, 14px);
            cursor: pointer;
            transition: all 0.3s;
            color: #333;
        }

        .option-btn.active {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }

        .option-btn:hover:not(.active) {
            background: #e0e0e0;
        }

        .generate-btn {
            width: 100%;
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: clamp(16px, 4vw, 20px);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        .generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            position: relative;
            overflow: hidden;
        }

        .loading::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .result-panel {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: none;
        }

        .result-panel.visible {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .result-title {
            font-size: clamp(18px, 4vw, 24px);
            color: #333;
            font-weight: bold;
        }

        .result-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: clamp(10px, 2vw, 12px);
            font-weight: bold;
        }

        .badge-cache {
            background: #4CAF50;
            color: white;
        }

        .badge-new {
            background: #667eea;
            color: white;
        }

        .badge-fallback {
            background: #ff9800;
            color: white;
        }

        .result-content {
            min-height: 100px;
        }

        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .emoji-item {
            font-size: clamp(36px, 8vw, 48px);
            text-align: center;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 15px;
            transition: all 0.3s;
        }

        .emoji-item:hover {
            transform: scale(1.1);
            background: #e0e0e0;
        }

        .animal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .animal-item {
            text-align: center;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 15px;
            transition: all 0.3s;
        }

        .animal-item:hover {
            transform: scale(1.05);
            background: #e0e0e0;
        }

        .animal-emoji {
            font-size: clamp(36px, 8vw, 48px);
            margin-bottom: 5px;
        }

        .animal-name {
            font-size: clamp(12px, 2.5vw, 14px);
            color: #666;
        }

        .animal-sound {
            font-size: clamp(10px, 2vw, 12px);
            color: #999;
            margin-top: 3px;
        }

        .shape-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .shape-item {
            text-align: center;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 15px;
            transition: all 0.3s;
        }

        .shape-item:hover {
            transform: scale(1.1);
            background: #e0e0e0;
        }

        .shape-emoji {
            font-size: clamp(36px, 8vw, 48px);
            margin-bottom: 5px;
        }

        .shape-name {
            font-size: clamp(12px, 2.5vw, 14px);
            color: #666;
        }

        .log-panel {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            padding: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .log-title {
            color: white;
            font-size: clamp(14px, 3vw, 16px);
            margin-bottom: 10px;
            font-weight: bold;
        }

        .log-entry {
            color: rgba(255, 255, 255, 0.8);
            font-size: clamp(11px, 2.5vw, 13px);
            margin-bottom: 5px;
            font-family: 'Courier New', monospace;
        }

        .log-entry.success {
            color: #4CAF50;
        }

        .log-entry.error {
            color: #f44336;
        }

        .log-entry.warning {
            color: #ff9800;
        }

        .log-entry.info {
            color: #2196F3;
        }

        @media (max-width: 600px) {
            .container {
                padding: 10px;
            }

            .control-panel,
            .result-panel {
                padding: 15px;
            }

            .emoji-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .animal-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .shape-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 AI 智能题目生成 Demo</h1>
        <p class="subtitle">体验无限题目生成功能，模拟 BigModel API 调用</p>

        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-value" id="totalGenerated">0</span>
                已生成
            </div>
            <div class="stat-item">
                <span class="stat-value" id="cacheHits">0</span>
                缓存命中
            </div>
            <div class="stat-item">
                <span class="stat-value" id="cacheSize">0</span>
                缓存大小
            </div>
        </div>

        <div class="game-tabs">
            <button class="game-tab active" data-game="memory">🧠 记忆游戏</button>
            <button class="game-tab" data-game="shape">⭐ 形状配对</button>
            <button class="game-tab" data-game="sound">🔊 声音配对</button>
        </div>

        <div class="control-panel">
            <div class="control-group" id="themeControl">
                <span class="control-label">选择主题</span>
                <div class="button-group" id="themeButtons">
                    <button class="option-btn active" data-value="水果">🍎 水果</button>
                    <button class="option-btn" data-value="动物">🐶 动物</button>
                    <button class="option-btn" data-value="交通工具">🚗 交通</button>
                    <button class="option-btn" data-value="运动">⚽ 运动</button>
                    <button class="option-btn" data-value="蔬菜">🥕 蔬菜</button>
                    <button class="option-btn" data-value="乐器">🎸 乐器</button>
                </div>
            </div>

            <div class="control-group" id="ageControl">
                <span class="control-label">年龄组</span>
                <div class="button-group">
                    <button class="option-btn" data-value="3-4岁">3-4岁</button>
                    <button class="option-btn active" data-value="4-5岁">4-5岁</button>
                    <button class="option-btn" data-value="5-6岁">5-6岁</button>
                </div>
            </div>

            <div class="control-group" id="difficultyControl">
                <span class="control-label">难度</span>
                <div class="button-group">
                    <button class="option-btn" data-value="简单">简单</button>
                    <button class="option-btn active" data-value="中等">中等</button>
                    <button class="option-btn" data-value="困难">困难</button>
                </div>
            </div>

            <div class="control-group" id="sceneControl" style="display: none;">
                <span class="control-label">选择场景</span>
                <div class="button-group" id="sceneButtons">
                    <button class="option-btn active" data-value="农场">🏡 农场</button>
                    <button class="option-btn" data-value="森林">🌲 森林</button>
                    <button class="option-btn" data-value="水里">🌊 水里</button>
                    <button class="option-btn" data-value="天空">☁️ 天空</button>
                </div>
            </div>

            <button class="generate-btn" id="generateBtn">✨ 生成题目</button>
        </div>

        <div class="result-panel" id="resultPanel">
            <div class="result-header">
                <span class="result-title" id="resultTitle">美味水果</span>
                <span class="result-badge badge-new" id="resultBadge">新生成</span>
            </div>
            <div class="result-content" id="resultContent">
            </div>
        </div>

        <div class="log-panel">
            <div class="log-title">📋 操作日志</div>
            <div id="logContainer">
                <div class="log-entry info">Demo 初始化完成</div>
            </div>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/ai-game-generator.js"></script>
    <script>
        // 状态管理
        let currentGame = 'memory';
        let currentTheme = '水果';
        let currentScene = '农场';
        let currentAgeGroup = '4-5岁';
        let currentDifficulty = '中等';
        let totalGenerated = 0;
        let cacheHits = 0;
        const aiCache = new AIGameCache();

        // DOM 元素
        const generateBtn = document.getElementById('generateBtn');
        const resultPanel = document.getElementById('resultPanel');
        const resultTitle = document.getElementById('resultTitle');
        const resultBadge = document.getElementById('resultBadge');
        const resultContent = document.getElementById('resultContent');
        const logContainer = document.getElementById('logContainer');

        // 初始化事件监听
        function init() {
            // 游戏切换
            document.querySelectorAll('.game-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.game-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentGame = tab.dataset.game;
                    updateControls();
                    addLog(`切换到 ${getGameName(currentGame)}`, 'info');
                });
            });

            // 主题选择
            document.querySelectorAll('#themeButtons .option-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('#themeButtons .option-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentTheme = btn.dataset.value;
                });
            });

            // 场景选择
            document.querySelectorAll('#sceneButtons .option-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('#sceneButtons .option-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentScene = btn.dataset.value;
                });
            });

            // 年龄组选择
            document.querySelectorAll('#ageControl .option-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('#ageControl .option-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentAgeGroup = btn.dataset.value;
                });
            });

            // 难度选择
            document.querySelectorAll('#difficultyControl .option-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('#difficultyControl .option-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentDifficulty = btn.dataset.value;
                });
            });

            // 生成按钮
            generateBtn.addEventListener('click', generateGame);

            // 触摸优化：只阻止双击缩放等特定行为
            document.addEventListener('dblclick', (e) => {
                e.preventDefault();
            }, { passive: false });

            document.addEventListener('gesturestart', (e) => {
                e.preventDefault();
            }, { passive: false });

            addLog('Demo 准备就绪', 'success');
        }

        function updateControls() {
            const themeControl = document.getElementById('themeControl');
            const sceneControl = document.getElementById('sceneControl');

            if (currentGame === 'memory') {
                themeControl.style.display = 'block';
                sceneControl.style.display = 'none';
            } else if (currentGame === 'shape') {
                themeControl.style.display = 'none';
                sceneControl.style.display = 'none';
            } else if (currentGame === 'sound') {
                themeControl.style.display = 'none';
                sceneControl.style.display = 'block';
            }
        }

        async function generateGame() {
            generateBtn.disabled = true;
            generateBtn.textContent = '⏳ 生成中...';
            generateBtn.classList.add('loading');
            resultPanel.classList.remove('visible');

            addLog(`开始生成: ${getGameName(currentGame)} (${getParamString()})`, 'info');

            try {
                let gameData;

                if (currentGame === 'memory') {
                    gameData = await aiGenerator.generateMemoryGame(currentTheme, currentAgeGroup, currentDifficulty);
                    displayMemoryResult(gameData);

                    if (!gameData.fromCache && !gameData.fallback) {
                        aiCache.saveGame('memory', gameData, {
                            theme: currentTheme,
                            ageGroup: currentAgeGroup,
                            difficulty: currentDifficulty
                        });
                        addLog('💾 已保存到本地缓存', 'success');
                    }
                } else if (currentGame === 'shape') {
                    gameData = await aiGenerator.generateShapeGame(currentAgeGroup, currentDifficulty);
                    displayShapeResult(gameData);

                    if (!gameData.fromCache && !gameData.fallback) {
                        aiCache.saveGame('shape', gameData, {
                            ageGroup: currentAgeGroup,
                            difficulty: currentDifficulty
                        });
                        addLog('💾 已保存到本地缓存', 'success');
                    }
                } else if (currentGame === 'sound') {
                    gameData = await aiGenerator.generateSoundGame(currentScene, currentAgeGroup, currentDifficulty);
                    displaySoundResult(gameData);

                    if (!gameData.fromCache && !gameData.fallback) {
                        aiCache.saveGame('sound', gameData, {
                            scene: currentScene,
                            ageGroup: currentAgeGroup,
                            difficulty: currentDifficulty
                        });
                        addLog('💾 已保存到本地缓存', 'success');
                    }
                }

                totalGenerated++;
                if (gameData.fromCache) {
                    cacheHits++;
                    addLog('✅ 使用缓存数据', 'success');
                } else {
                    addLog('🔄 AI 生成新数据', 'info');
                }

                updateStats();

            } catch (error) {
                addLog(`❌ 生成失败: ${error.message}`, 'error');
                console.error(error);
            } finally {
                generateBtn.disabled = false;
                generateBtn.textContent = '✨ 生成题目';
                generateBtn.classList.remove('loading');
            }
        }

        function displayMemoryResult(data) {
            resultTitle.textContent = data.theme;
            updateResultBadge(data);

            let html = `<div class="emoji-grid">`;
            data.emojis.forEach(emoji => {
                html += `<div class="emoji-item">${emoji}</div>`;
            });
            html += `</div>`;

            resultContent.innerHTML = html;
            resultPanel.classList.add('visible');
        }

        function displayShapeResult(data) {
            resultTitle.textContent = '形状配对';
            updateResultBadge(data);

            let html = `<div class="shape-grid">`;
            data.shapes.forEach(shape => {
                html += `
                    <div class="shape-item">
                        <div class="shape-emoji">${shape.emoji}</div>
                        <div class="shape-name">${shape.name}</div>
                    </div>
                `;
            });
            html += `</div>`;

            resultContent.innerHTML = html;
            resultPanel.classList.add('visible');
        }

        function displaySoundResult(data) {
            resultTitle.textContent = data.scene;
            updateResultBadge(data);

            let html = `<div class="animal-grid">`;
            data.animals.forEach(animal => {
                html += `
                    <div class="animal-item">
                        <div class="animal-emoji">${animal.emoji}</div>
                        <div class="animal-name">${animal.name}</div>
                        <div class="animal-sound">${animal.sound_text}</div>
                    </div>
                `;
            });
            html += `</div>`;

            resultContent.innerHTML = html;
            resultPanel.classList.add('visible');
        }

        function updateResultBadge(data) {
            if (data.fromCache) {
                resultBadge.textContent = '缓存数据';
                resultBadge.className = 'result-badge badge-cache';
            } else if (data.fallback) {
                resultBadge.textContent = '预设数据';
                resultBadge.className = 'result-badge badge-fallback';
            } else {
                resultBadge.textContent = '新生成';
                resultBadge.className = 'result-badge badge-new';
            }
        }

        function updateStats() {
            document.getElementById('totalGenerated').textContent = totalGenerated;
            document.getElementById('cacheHits').textContent = cacheHits;
            document.getElementById('cacheSize').textContent = aiGenerator.getCacheSize();
        }

        function getGameName(game) {
            const names = {
                'memory': '记忆游戏',
                'shape': '形状配对',
                'sound': '声音配对'
            };
            return names[game] || game;
        }

        function getParamString() {
            if (currentGame === 'memory') {
                return `${currentTheme} / ${currentAgeGroup} / ${currentDifficulty}`;
            } else if (currentGame === 'sound') {
                return `${currentScene} / ${currentAgeGroup} / ${currentDifficulty}`;
            } else {
                return `${currentAgeGroup} / ${currentDifficulty}`;
            }
        }

        function addLog(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${timestamp}] ${message}`;
            logContainer.insertBefore(entry, logContainer.firstChild);

            // 保持最多50条日志
            while (logContainer.children.length > 50) {
                logContainer.removeChild(logContainer.lastChild);
            }
        }

        // 启动
        init();
    </script>
</body>
</html>
