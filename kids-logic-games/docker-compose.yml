version: '3.8'

services:
  # Express API 服务（可选，用于数据同步）
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_PATH=/data/games.db
      - REDIS_URL=redis://redis:6379
    volumes:
      - db-data:/data
      - ./backend:/app
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - games-network

  # Redis 缓存服务
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - games-network

  # PostgreSQL 数据库（可选）
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: gamesdb
      POSTGRES_USER: gamesuser
      POSTGRES_PASSWORD: gamespass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    networks:
      - games-network

  # 管理界面（可选）
  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - games-network

volumes:
  db-data:
    driver: local
  redis-data:
    driver: local
  postgres-data:
    driver: local

networks:
  games-network:
    driver: bridge