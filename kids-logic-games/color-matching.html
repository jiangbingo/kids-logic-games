<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>颜色认知游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .game-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            color: white;
        }
        
        .title {
            font-size: 36px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 15px;
        }
        
        .score-board {
            font-size: 28px;
            background: rgba(255,255,255,0.2);
            padding: 10px 30px;
            border-radius: 20px;
        }
        
        .star { color: #FFD700; }
        
        .target-area {
            text-align: center;
        }
        
        .target-label {
            font-size: 36px;
            color: white;
            margin-bottom: 20px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }
        
        .target-color-name {
            font-size: 48px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: colorPulse 1s ease-in-out infinite;
        }
        
        @keyframes colorPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .options-area {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            padding: 30px;
        }
        
        .color-btn {
            width: 130px;
            height: 130px;
            border: 6px solid white;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.1s, box-shadow 0.1s;
            touch-action: manipulation;
        }
        
        .color-btn:active {
            transform: scale(0.9);
        }
        
        .color-btn.correct {
            animation: correctFlash 0.5s ease;
            box-shadow: 0 0 30px rgba(255,255,255,0.8);
        }
        
        @keyframes correctFlash {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        
        .color-btn.wrong {
            animation: wrongShake 0.5s ease;
        }
        
        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-15px); }
            75% { transform: translateX(15px); }
        }
        
        .feedback {
            font-size: 52px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            opacity: 0;
        }
        
        .feedback.show {
            opacity: 1;
            animation: feedbackPop 0.5s ease;
        }
        
        @keyframes feedbackPop {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .parent-control {
            position: fixed;
            bottom: 10px;
            right: 10px;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50%;
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            cursor: pointer;
        }
        
        .celebration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }
        
        .bubble {
            position: absolute;
            border-radius: 50%;
            animation: bubbleRise 3s ease-out forwards;
        }
        
        @keyframes bubbleRise {
            0% { transform: translateY(100vh) scale(0); opacity: 0.8; }
            100% { transform: translateY(-100px) scale(1); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="title">找颜色</div>
            <div class="score-board">
                <span class="star">⭐</span> <span id="score">0</span>
            </div>
        </div>
        
        <div class="target-area">
            <div class="target-label">找到这个颜色：</div>
            <div class="target-color-name" id="targetColorName">红色</div>
        </div>
        
        <div class="feedback" id="feedback"></div>
        
        <div class="options-area" id="optionsArea"></div>
    </div>
    
    <button class="parent-control" ontouchstart="initGame()">🔄</button>
    
    <div class="celebration" id="celebration"></div>

    <script>
        // ==================== 颜色定义 ====================
        const COLORS = [
            { name: '红色', hex: '#FF4757', light: '#FF6B7A' },
            { name: '黄色', hex: '#FFA502', light: '#FFB732' },
            { name: '蓝色', hex: '#3742FA', light: '#5352ED' },
            { name: '绿色', hex: '#2ED573', light: '#7BED9F' },
            { name: '橙色', hex: '#FF6B35', light: '#FF7F50' },
            { name: '紫色', hex: '#A55EEA', light: '#BE7ADB' },
            { name: '粉色', hex: '#FF69B4', light: '#FF85C1' },
            { name: '黑色', hex: '#2C3E50', light: '#34495E' }
        ];
        
        // ==================== 游戏状态 ====================
        let gameState = {
            score: 0,
            targetColor: null,
            isAnimating: false
        };
        
        // ==================== 音效 ====================
        function playSound(type) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                const config = {
                    correct: { freq: 659.25, duration: 0.15, type: 'sine' },
                    wrong: { freq: 196.00, duration: 0.2, type: 'square' },
                    celebrate: { freq: 783.99, duration: 0.2, type: 'sine' }
                };
                
                const c = config[type] || config.correct;
                oscillator.type = c.type;
                oscillator.frequency.setValueAtTime(c.freq, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + c.duration);
                
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + c.duration);
            } catch(e) {}
        }
        
        // ==================== 游戏核心 ====================
        function initGame() {
            gameState.score = 0;
            updateScore();
            newRound();
        }
        
        function newRound() {
            if (gameState.isAnimating) return;
            
            // 随机选择4个颜色
            const shuffled = [...COLORS].sort(() => Math.random() - 0.5);
            const selectedColors = shuffled.slice(0, 4);
            
            // 随机选择目标
            gameState.targetColor = selectedColors[Math.floor(Math.random() * selectedColors.length)];
            
            // 显示目标
            document.getElementById('targetColorName').textContent = gameState.targetColor.name;
            
            // 创建选项
            const optionsArea = document.getElementById('optionsArea');
            optionsArea.innerHTML = '';
            
            const shuffledOptions = [...selectedColors].sort(() => Math.random() - 0.5);
            
            shuffledOptions.forEach(color => {
                const btn = document.createElement('button');
                btn.className = 'color-btn';
                btn.style.background = `linear-gradient(135deg, ${color.hex} 0%, ${color.light} 100%)`;
                btn.setAttribute('data-color', color.name);
                
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    checkAnswer(color.name, btn);
                }, { passive: false });
                
                optionsArea.appendChild(btn);
            });
        }
        
        function checkAnswer(selected, btnElement) {
            if (gameState.isAnimating) return;
            gameState.isAnimating = true;
            
            const isCorrect = selected === gameState.targetColor.name;
            const feedback = document.getElementById('feedback');
            
            if (isCorrect) {
                btnElement.classList.add('correct');
                feedback.textContent = '对了！🎉';
                feedback.classList.add('show');
                playSound('correct');
                
                gameState.score++;
                updateScore();
                
                if (gameState.score % 5 === 0) {
                    celebrate();
                }
                
                setTimeout(() => {
                    feedback.classList.remove('show');
                    btnElement.classList.remove('correct');
                    gameState.isAnimating = false;
                    newRound();
                }, 1200);
                
            } else {
                btnElement.classList.add('wrong');
                feedback.textContent = '再试试！💪';
                feedback.classList.add('show');
                playSound('wrong');
                
                setTimeout(() => {
                    feedback.classList.remove('show');
                    btnElement.classList.remove('wrong');
                    gameState.isAnimating = false;
                }, 800);
            }
        }
        
        function updateScore() {
            document.getElementById('score').textContent = gameState.score;
        }
        
        function celebrate() {
            playSound('celebrate');
            const container = document.getElementById('celebration');
            
            COLORS.forEach((color, i) => {
                for (let j = 0; j < 5; j++) {
                    const bubble = document.createElement('div');
                    bubble.className = 'bubble';
                    bubble.style.background = color.hex;
                    bubble.style.width = (30 + Math.random() * 30) + 'px';
                    bubble.style.height = bubble.style.width;
                    bubble.style.left = Math.random() * 100 + '%';
                    bubble.style.animationDelay = (i * 0.2 + Math.random() * 0.3) + 's';
                    container.appendChild(bubble);
                    
                    setTimeout(() => bubble.remove(), 3500);
                }
            });
        }
        
        // ==================== 启动 ====================
        document.addEventListener('DOMContentLoaded', initGame);
        
        // 防止双击缩放
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });
        
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) e.preventDefault();
            lastTouchEnd = now;
        }, { passive: false });
    </script>
</body>
</html>
